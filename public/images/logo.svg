<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#badgeGrad)"/>

  <!-- Receipt silhouette: straight top, classic torn/zigzag bottom edge -->
  <path
    d="M16,10 L48,10 L48,44
       L45.3,50 L42.7,44 L40,50 L37.3,44 L34.7,50
       L32,44 L29.3,50 L26.7,44 L24,50 L21.3,44 L18.7,50
       L16,44 Z"
    fill="#ffffff"
  />

  <!-- Itemized billing lines (faint, sits behind/below the pulse) -->
  <g stroke="#1e3a8a" stroke-width="2" stroke-linecap="round" opacity="0.28">
    <line x1="20" y1="35" x2="36" y2="35"/>
    <line x1="20" y1="39.5" x2="30" y2="39.5"/>
  </g>

  <!-- Heartbeat / pulse line: the dialysis patient monitoring cue -->
  <path
    d="M19,26 L24.5,26 L27.5,18.5 L31,34 L34,26 L45,26"
    fill="none"
    stroke="#4f46e5"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
